name: Check

on:
  push:
    branches-ignore:
      - 'release/**'
      - 'relase/**'
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  RUST_VERSION: '1.91.1'

jobs:
  repository-layout:
    name: Repository layout and assets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify required project files
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            README.md
            branding/cohmira/cohmira-mark.svg
            src/Cargo.toml
            src/desktop/package-lock.json
            src/src-tauri/tauri.conf.json
            src/Plugin/pnpm-lock.yaml
            boss/desktop/package-lock.json
          )
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "::error file=$file::Required repository file is missing"
              exit 1
            fi
          done

      - name: Validate JSON and SVG assets
        shell: python
        run: |
          import json
          from pathlib import Path
          from xml.etree import ElementTree

          json_files = [
              Path('src/desktop/package.json'),
              Path('src/src-tauri/tauri.conf.json'),
              Path('src/Plugin/src/manifest.json'),
              Path('boss/desktop/package.json'),
          ]
          svg_files = sorted(Path('branding/cohmira').glob('*.svg'))

          for path in json_files:
              json.loads(path.read_text(encoding='utf-8'))
              print(f'valid json: {path}')

          if not svg_files:
              raise SystemExit('No Cohmira SVG assets found')
          for path in svg_files:
              ElementTree.parse(path)
              print(f'valid svg: {path}')

  employee-frontend:
    name: Employee frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix src/desktop

      - name: Check strict employee TypeScript
        run: npm run typecheck --prefix src/desktop

      - name: Test employee frontend with coverage
        run: npm run test:coverage --prefix src/desktop

      - name: Test Windows offline runtime contract
        run: node --test src/scripts/windows-runtime.test.mjs

      - name: Test bundled configuration safety
        run: node --test src/scripts/tauri-bundle-config.test.mjs

      - name: Build employee frontend
        run: npm run build --prefix src/desktop

      - name: Upload employee coverage report
        uses: actions/upload-artifact@v4
        with:
          name: employee-frontend-coverage
          path: src/desktop/coverage/
          if-no-files-found: error
          retention-days: 14

  boss-frontend:
    name: Boss frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: boss/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix boss/desktop

      - name: Type-check and build boss frontend
        run: npm run build --prefix boss/desktop

  browser-extension:
    name: Browser extension
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: src/Plugin/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir src/Plugin install --frozen-lockfile

      - name: Build extension
        run: pnpm --dir src/Plugin build

      - name: Type-check extension
        run: pnpm --dir src/Plugin typecheck

  rust-core:
    name: Rust core
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "${RUST_VERSION}" --profile minimal --no-self-update
          rustup default "${RUST_VERSION}"

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src -> target

      - name: Check Rust services
        run: >-
          cargo check
          --manifest-path src/Cargo.toml
          --locked
          -p yunying-ops
          -p yunying-server
          --features yunying-ops/mcp

      - name: Test Python plugin runtime selection
        run: >-
          cargo test
          --manifest-path src/Cargo.toml
          --locked
          -p yunying-server
          plugins::runtime::tests
          --lib
