name: Employee Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: employee-release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  RUST_VERSION: '1.92'
  TAURI_CLI_VERSION: '2.11.4'

jobs:
  release-metadata:
    name: Validate employee release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate tag and package versions
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "JSON.parse(require('fs').readFileSync('src/src-tauri/tauri.conf.json', 'utf8')).version")"
          desktop_version="$(node -p "JSON.parse(require('fs').readFileSync('src/desktop/package.json', 'utf8')).version")"
          cargo_version="$(sed -n 's/^version = \"\([^\"]*\)\"/\1/p' src/src-tauri/Cargo.toml | head -n 1)"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid Tauri version: $version"
            exit 1
          fi
          if [[ "$desktop_version" != "$version" || "$cargo_version" != "$version" ]]; then
            echo "::error::Employee versions differ: tauri=$version desktop=$desktop_version cargo=$cargo_version"
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="v${version}"
          fi
          if [[ "$tag" != "v${version}" ]]; then
            echo "::error::Release tag $tag must match employee version v${version}"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  checks:
    name: Run required checks
    uses: ./.github/workflows/check.yml
    permissions:
      contents: read

  package-macos:
    name: Package employee client for macOS
    needs:
      - checks
      - release-metadata
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/desktop/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install employee frontend dependencies
        run: npm ci --prefix src/desktop

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "${RUST_VERSION}" --profile minimal --no-self-update
          rustup default "${RUST_VERSION}"

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src -> target
            src/src-tauri -> target

      - name: Prepare bundled uv runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src/src-tauri/runtime/bin
          cp "$(command -v uv)" src/src-tauri/runtime/bin/uv
          chmod +x src/src-tauri/runtime/bin/uv

      - name: Install Tauri CLI
        run: npm install --global "@tauri-apps/cli@${TAURI_CLI_VERSION}"

      - name: Build macOS DMG
        shell: bash
        run: |
          set -euo pipefail
          cd src
          tauri build --bundles dmg -- --locked

      - name: Normalize macOS artifact name
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.release-metadata.outputs.version }}"
          arch="$(uname -m)"
          if [[ "$arch" == "x86_64" ]]; then arch="x64"; fi
          dmg="$(find src/src-tauri/target -type f -path '*/bundle/dmg/*.dmg' -print -quit)"
          if [[ -z "$dmg" ]]; then
            echo '::error::Tauri did not produce a DMG'
            exit 1
          fi
          mkdir -p release-assets
          output="release-assets/Cohmira-Workspace-${version}-macOS-${arch}.dmg"
          cp "$dmg" "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: employee-release-macos
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  package-windows:
    name: Package employee client for Windows
    needs:
      - checks
      - release-metadata
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/desktop/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install employee frontend dependencies
        run: npm ci --prefix src/desktop

      - name: Install Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install $env:RUST_VERSION --profile minimal --no-self-update
          rustup default $env:RUST_VERSION

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src -> target
            src/src-tauri -> target

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --yes --no-progress

      - name: Prepare bundled uv runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src/src-tauri/runtime/bin | Out-Null
          Copy-Item (Get-Command uv).Source src/src-tauri/runtime/bin/uv.exe -Force

      - name: Cache Windows offline runtime downloads
        uses: actions/cache@v4
        with:
          path: src/.runtime-cache/windows
          key: windows-offline-runtime-${{ hashFiles('src/scripts/windows-runtime-lib.mjs', 'src/builtin-plugins/openmontage/requirements-windows.lock') }}

      - name: Prepare and verify Windows offline runtime
        shell: pwsh
        run: |
          node src/scripts/prepare-windows-runtime.mjs
          node src/scripts/verify-windows-runtime.mjs

      - name: Install Tauri CLI
        run: npm install --global "@tauri-apps/cli@${{ env.TAURI_CLI_VERSION }}"

      - name: Build Windows NSIS installer
        shell: pwsh
        run: |
          Push-Location src
          try {
            tauri build --bundles nsis -- --locked
          } finally {
            Pop-Location
          }

      - name: Normalize Windows artifact name
        id: artifact
        shell: pwsh
        run: |
          $version = '${{ needs.release-metadata.outputs.version }}'
          $installer = Get-ChildItem src/src-tauri/target -Recurse -File -Filter *.exe |
            Where-Object { $_.FullName -match '[\\/]bundle[\\/]nsis[\\/]' } |
            Select-Object -First 1
          if (-not $installer) {
            Write-Error 'Tauri did not produce an NSIS installer'
          }
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $output = "release-assets/Cohmira-Workspace-$version-Windows-x64-setup.exe"
          Copy-Item $installer.FullName $output -Force
          "path=$output" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: employee-release-windows
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish employee GitHub Release
    needs:
      - release-metadata
      - package-macos
      - package-windows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          pattern: employee-release-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release metadata and checksums
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.release-metadata.outputs.version }}"
          tag="${{ needs.release-metadata.outputs.tag }}"
          title="Cohmira Workspace ${version}"

          shopt -s nullglob
          packages=(release-assets/*.dmg release-assets/*.exe)
          if [[ "${#packages[@]}" -ne 2 ]]; then
            echo "::error::Expected one DMG and one Windows installer, found ${#packages[@]} packages"
            printf '%s\n' "${packages[@]}"
            exit 1
          fi
          (
            cd release-assets
            sha256sum ./*.dmg ./*.exe > SHA256SUMS.txt
          )

          cat > release-notes.md <<EOF
          Automated employee desktop prerelease for 商媒运营助手 Cohmira Workspace ${version}.

          Commit: \`${GITHUB_SHA}\`

          Included artifacts:
          - Cohmira Workspace macOS DMG (ad-hoc signed, not notarized)
          - Cohmira Workspace Windows x64 NSIS installer (unsigned)
          - SHA-256 checksums

          The Windows installer includes the pinned FFmpeg and Python plugin offline runtimes. The macOS package includes uv but does not yet bundle complete offline FFmpeg/Python runtimes. Gatekeeper or SmartScreen may warn because these prerelease packages do not use production signing certificates.
          EOF

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_TITLE: ${{ steps.metadata.outputs.title }}
        shell: bash
        run: |
          set -euo pipefail
          if existing_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}" --jq .sha 2>/dev/null)"; then
            if [[ "$existing_sha" != "$GITHUB_SHA" ]]; then
              echo "::error::Tag $RELEASE_TAG already points to $existing_sha instead of $GITHUB_SHA"
              exit 1
            fi
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --prerelease
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --prerelease
          fi
