name: Package and Release

on:
  push:
    branches:
      - 'release/**'
      - 'relase/**'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  RUST_VERSION: '1.91.1'
  TAURI_CLI_VERSION: '2.11.4'

jobs:
  checks:
    name: Run required checks
    uses: ./.github/workflows/check.yml
    permissions:
      contents: read

  package-macos:
    name: Package employee client for macOS
    needs: checks
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/desktop/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@v8

      - name: Install employee frontend dependencies
        run: npm ci --prefix src/desktop

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install "${RUST_VERSION}" --profile minimal --no-self-update
          rustup default "${RUST_VERSION}"

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src -> target
            src/src-tauri -> target

      - name: Prepare bundled uv runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src/src-tauri/runtime/bin
          cp "$(command -v uv)" src/src-tauri/runtime/bin/uv
          chmod +x src/src-tauri/runtime/bin/uv

      - name: Install Tauri CLI
        run: npm install --global "@tauri-apps/cli@${TAURI_CLI_VERSION}"

      - name: Build macOS DMG
        shell: bash
        run: |
          set -euo pipefail
          cd src
          tauri build --bundles dmg

      - name: Normalize macOS artifact name
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "JSON.parse(require('fs').readFileSync('src/src-tauri/tauri.conf.json', 'utf8')).version")"
          arch="$(uname -m)"
          if [[ "$arch" == "x86_64" ]]; then arch="x64"; fi
          dmg="$(find src/src-tauri/target -type f -path '*/bundle/dmg/*.dmg' -print -quit)"
          if [[ -z "$dmg" ]]; then
            echo '::error::Tauri did not produce a DMG'
            exit 1
          fi
          mkdir -p release-assets
          output="release-assets/Cohmira-Workspace-${version}-macOS-${arch}.dmg"
          cp "$dmg" "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  package-windows:
    name: Package employee client for Windows
    needs: checks
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/desktop/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@v8

      - name: Install employee frontend dependencies
        run: npm ci --prefix src/desktop

      - name: Install Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install $env:RUST_VERSION --profile minimal --no-self-update
          rustup default $env:RUST_VERSION

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src -> target
            src/src-tauri -> target

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --yes --no-progress

      - name: Prepare bundled uv runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src/src-tauri/runtime/bin | Out-Null
          Copy-Item (Get-Command uv).Source src/src-tauri/runtime/bin/uv.exe -Force

      - name: Cache Windows offline runtime downloads
        uses: actions/cache@v4
        with:
          path: src/.runtime-cache/windows
          key: windows-offline-runtime-${{ hashFiles('src/scripts/windows-runtime-lib.mjs', 'src/builtin-plugins/openmontage/requirements-windows.lock') }}

      - name: Prepare and verify Windows offline runtime
        shell: pwsh
        run: |
          node src/scripts/prepare-windows-runtime.mjs
          node src/scripts/verify-windows-runtime.mjs

      - name: Install Tauri CLI
        run: npm install --global "@tauri-apps/cli@${{ env.TAURI_CLI_VERSION }}"

      - name: Build Windows NSIS installer
        shell: pwsh
        run: |
          Push-Location src
          try {
            tauri build --bundles nsis
          } finally {
            Pop-Location
          }

      - name: Normalize Windows artifact name
        id: artifact
        shell: pwsh
        run: |
          $version = (Get-Content src/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $installer = Get-ChildItem src/src-tauri/target -Recurse -File -Filter *.exe |
            Where-Object { $_.FullName -match '[\\/]bundle[\\/]nsis[\\/]' } |
            Select-Object -First 1
          if (-not $installer) {
            Write-Error 'Tauri did not produce an NSIS installer'
          }
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $output = "release-assets/Cohmira-Workspace-$version-Windows-x64-setup.exe"
          Copy-Item $installer.FullName $output -Force
          "path=$output" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  package-web-assets:
    name: Package boss web client and browser extension
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: src/Plugin/pnpm-lock.yaml

      - name: Build boss frontend
        shell: bash
        run: |
          set -euo pipefail
          npm ci --prefix boss/desktop
          npm run build --prefix boss/desktop

      - name: Build browser extension
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir src/Plugin install --frozen-lockfile
          pnpm --dir src/Plugin build
          pnpm --dir src/Plugin typecheck

      - name: Create ZIP packages
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "JSON.parse(require('fs').readFileSync('src/src-tauri/tauri.conf.json', 'utf8')).version")"
          plugin_version="$(node -p "JSON.parse(require('fs').readFileSync('src/Plugin/package.json', 'utf8')).version")"
          mkdir -p release-assets

          (
            cd boss/desktop/dist
            zip -qr "../../../release-assets/Cohmira-Command-${version}-web.zip" .
          )
          (
            cd src/Plugin/dist/extension
            zip -qr "../../../../release-assets/Cohmira-Browser-Extension-${plugin_version}.zip" .
          )

      - name: Upload web packages
        uses: actions/upload-artifact@v4
        with:
          name: release-web-assets
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    needs:
      - package-macos
      - package-windows
      - package-web-assets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release metadata and checksums
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "JSON.parse(require('fs').readFileSync('src/src-tauri/tauri.conf.json', 'utf8')).version")"
          branch="${GITHUB_REF_NAME#release/}"
          branch="${branch#relase/}"
          tag="v${version}-build.${GITHUB_RUN_NUMBER}"
          title="商媒运营助手 Cohmira ${version} · ${branch} · build ${GITHUB_RUN_NUMBER}"

          cd release-assets
          sha256sum ./* > SHA256SUMS.txt
          cd ..

          cat > release-notes.md <<EOF
          Automated 商媒运营助手 Cohmira package from branch \`${GITHUB_REF_NAME}\`.

          Commit: \`${GITHUB_SHA}\`

          Included artifacts:
          - Cohmira Workspace macOS DMG (ad-hoc signed, not notarized)
          - Cohmira Workspace Windows x64 NSIS installer
          - Cohmira Command static web bundle
          - Cohmira browser extension ZIP
          - SHA-256 checksums

          The boss web bundle still requires its local API/MCP bridge. The Windows employee installer includes the pinned FFmpeg and Python plugin offline runtimes.
          EOF

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_TITLE: ${{ steps.metadata.outputs.title }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file release-notes.md
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md
          fi
